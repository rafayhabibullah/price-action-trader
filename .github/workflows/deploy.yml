name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'trading/**'
      - 'strategies/**'
      - 'backtest/**'
      - 'Dockerfile'
      - 'pyproject.toml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: trading-bot
  REPO: trading-bot

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ --ignore=tests/test_paper_trading_integration.py -q

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} .
          docker tag \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --min-instances=0 \
            --max-instances=1 \
            --concurrency=1 \
            --ingress=internal \
            --no-allow-unauthenticated \
            --set-secrets="ALPACA_API_KEY=alpaca-api-key:latest,ALPACA_SECRET_KEY=alpaca-secret-key:latest" \
            --service-account=${{ env.SERVICE_NAME }}-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --quiet

      - name: Get Cloud Run URL
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Create or update Cloud Scheduler job
        run: |
          SA_EMAIL=${{ env.SERVICE_NAME }}-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          JOB_NAME=${{ env.SERVICE_NAME }}-hourly

          # Try create, update if exists
          gcloud scheduler jobs create http $JOB_NAME \
            --location=${{ env.REGION }} \
            --schedule="0 * * * *" \
            --uri="${{ steps.get-url.outputs.url }}/" \
            --http-method=POST \
            --oidc-service-account-email=$SA_EMAIL \
            --oidc-token-audience="${{ steps.get-url.outputs.url }}/" \
            --attempt-deadline=300s \
            --quiet 2>/dev/null || \
          gcloud scheduler jobs update http $JOB_NAME \
            --location=${{ env.REGION }} \
            --schedule="0 * * * *" \
            --uri="${{ steps.get-url.outputs.url }}/" \
            --http-method=POST \
            --oidc-service-account-email=$SA_EMAIL \
            --oidc-token-audience="${{ steps.get-url.outputs.url }}/" \
            --attempt-deadline=300s \
            --quiet

          echo "Cloud Scheduler job configured: 0 * * * * -> ${{ steps.get-url.outputs.url }}/"

      - name: Deployment summary
        run: |
          echo "Deployed ${{ env.SERVICE_NAME }} to Cloud Run"
          echo "URL: ${{ steps.get-url.outputs.url }}"
          echo "Scheduler: runs every hour at :00"
